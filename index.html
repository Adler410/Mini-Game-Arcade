<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediaHub Arcade — Dodge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Zurück Button -->
  <a href="../index.html" class="back-button">
    <span class="arrow">←</span> Zurück zu MediaHub
  </a>

  <!-- Hintergrund Glow -->
  <div class="bg-glow"></div>

  <main class="game-shell">
    <header class="hud">
      <div class="hud-card">
        <span class="hud-label">Score</span>
        <span id="score" class="hud-value">0</span>
      </div>
      <h1 class="title">MEDIA<span>HUB</span> ARCADE</h1>
      <div class="hud-card">
        <span class="hud-label">Best</span>
        <span id="best" class="hud-value">0</span>
      </div>
    </header>

    <div class="canvas-wrap">
      <canvas id="game" width="800" height="600"></canvas>

      <!-- Start Overlay -->
      <div id="startOverlay" class="overlay">
        <div class="overlay-card">
          <h2>Bereit?</h2>
          <p>Weiche den Blöcken aus. Steuere mit <b>Pfeiltasten</b>, <b>WASD</b>, <b>Maus</b> oder per <b>Touch</b>.</p>
          <div class="difficulty">
            <span class="diff-label">Schwierigkeit</span>
            <div class="diff-options" role="radiogroup" aria-label="Schwierigkeit">
              <button type="button" class="diff-btn active" data-diff="easy">Einfach</button>
              <button type="button" class="diff-btn" data-diff="medium">Mittel</button>
              <button type="button" class="diff-btn" data-diff="hard">Schwer</button>
            <button type="button" class="diff-btn" data-diff="extreme">Extrem</button>
            <button type="button" class="diff-btn" data-diff="god">Gott</button>
            <button type="button" class="diff-btn" data-diff="infinite">Unendlich</button>
            </div>
            <p class="diff-hint" id="diffHint">Blöcke fallen von oben. Bewege dich links/rechts.</p>
          </div>
          <button id="startBtn" class="btn-primary">Spiel starten</button>
        </div>
      </div>

      <!-- Game Over Overlay -->
      <div id="gameOverOverlay" class="overlay hidden">
        <div class="overlay-card">
          <h2>Game Over</h2>
          <p>Score: <span id="finalScore">0</span></p>
          <p class="muted">Best: <span id="finalBest">0</span></p>
          <div class="difficulty">
            <span class="diff-label">Schwierigkeit</span>
            <div class="diff-options" role="radiogroup" aria-label="Schwierigkeit">
              <button type="button" class="diff-btn active" data-diff="easy">Einfach</button>
              <button type="button" class="diff-btn" data-diff="medium">Mittel</button>
              <button type="button" class="diff-btn" data-diff="hard">Schwer</button>
            <button type="button" class="diff-btn" data-diff="extreme">Extrem</button>
            <button type="button" class="diff-btn" data-diff="god">Gott</button>
            <button type="button" class="diff-btn" data-diff="infinite">Unendlich</button>
            </div>
          </div>
          <button id="restartBtn" class="btn-primary">Nochmal spielen</button>
        </div>
      </div>
    </div>

    <footer class="footnote">
      Crafted for <span class="brand">MediaHub</span> · Anime Arcade Edition
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
